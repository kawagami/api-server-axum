# media.kawa.homes — 上傳媒體公開網域
# 直接從本地磁碟 /srv/kawa/uploads 靜態服務(不經 backend),與儲存後端解耦。
# 精確 server_name 優先於 kawa.homes.conf 的 *.kawa.homes wildcard,不會被導到前端。
# TLS 沿用 kawa.homes wildcard 憑證(涵蓋 *.kawa.homes)。
server {
    listen       80;
    listen  [::]:80;
    server_name  media.kawa.homes;
    return 301 https://$host$request_uri;
}

server {
    listen       443 ssl;
    listen  [::]:443 ssl;
    http2 on;
    server_name  media.kawa.homes;

    ssl_certificate     /etc/letsencrypt/live/kawa.homes/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kawa.homes/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 檔案以 <uuid>.<ext> 平放在 uploads 根目錄,內容不可變,可長期強快取
    location / {
        root /srv/kawa/uploads;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
