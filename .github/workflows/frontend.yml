name: frontend-ci

on:
  push:
    branches:
      - 'master'
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: kawagami77/my-next-blog:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # 與 backend.yml 的 deploy job 共用 group：build 各自並行，只有部署階段序列化（排隊、不取消）
    concurrency:
      group: vps-deploy
      cancel-in-progress: false
    steps:
      -
        name: Update Vultr VPS Docker Service
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VULTR_HOST }}
          username: ${{ secrets.VULTR_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull kawagami77/my-next-blog:latest
            sh up.sh
            docker image prune --force
