name: backend-ci

on:
  push:
    branches:
      - 'master'
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      -
        name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      -
        name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings
      -
        name: Test
        run: cargo test --locked

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          # :latest 供 docker-env 部署；:sha 供回滾（docker pull kawagami77/api-server:<sha>）
          tags: |
            kawagami77/api-server:latest
            kawagami77/api-server:${{ github.sha }}
          cache-from: type=registry,ref=kawagami77/api-server:buildcache
          cache-to: type=registry,ref=kawagami77/api-server:buildcache,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # 與 frontend.yml 的 deploy job 共用 group：build 各自並行，只有部署階段序列化（排隊、不取消）
    concurrency:
      group: vps-deploy
      cancel-in-progress: false
    steps:
      -
        name: Update Vultr VPS Docker Service
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VULTR_HOST }}
          username: ${{ secrets.VULTR_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd docker-env
            docker pull kawagami77/api-server:latest
            docker-compose up -d --remove-orphans
            docker image prune --force
